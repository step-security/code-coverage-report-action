name: "Pull Request"
on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      - run: npm ci
      - run: npm run lint
      - run: npm run test >> "${GITHUB_STEP_SUMMARY}"
      - run: npm run package
      - uses: ./
        id: code_coverage_report_action
        if: ${{ github.actor != 'dependabot[bot]'}}
        with:
          filename: "coverage/clover.xml"
          artifact_download_workflow_names: "code-coverage-report"
          badge: true
          fail_on_negative_difference: true
          overall_coverage_fail_threshold: 70
      - name: Add Coverage PR Comment
        uses: step-security/sticky-pull-request-comment@f062e9edbd7a1cf1661c5863f76b8dc3fcbdce70 # v3.0.4
        if: steps.code_coverage_report_action.outputs.file != '' && github.event_name == 'pull_request' && (success() || failure())
        with:
          recreate: true
          path: code-coverage-results.md
